<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>株式会社アドトラック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f23;
    --accent: #e94560;
    --gold: #ffd700;
    --white: #f5f5f5;
    --gray: #b4b4c8;
    --box-bg: #32142a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    background: linear-gradient(180deg, #0f0f23 0%, #161636 50%, #0f0f23 100%);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--white);
    padding: 1.5rem 1rem;
    overflow: hidden;
  }
  .card::before, .card::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    height: 5px;
    background: var(--accent);
    z-index: 100;
  }
  .card::before { top: 0; }
  .card::after { bottom: 0; }
  .side-line {
    position: fixed;
    top: 3rem; bottom: 3rem;
    width: 1px;
    background: #2a2a4e;
    z-index: 100;
  }
  .side-line.left { left: 1.2rem; }
  .side-line.right { right: 1.2rem; }
  .diamond {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--accent);
    transform: rotate(45deg);
    z-index: 100;
  }
  .diamond.tl { top: 1.5rem; left: 1.5rem; }
  .diamond.tr { top: 1.5rem; right: 1.5rem; }
  .diamond.bl { bottom: 1.5rem; left: 1.5rem; }
  .diamond.br { bottom: 1.5rem; right: 1.5rem; }
  .card {
    max-width: 480px;
    width: 100%;
    position: relative;
    padding: 2.5rem 1.5rem 2rem;
    text-align: center;
  }
  .screen { display: none; }
  .screen.active { display: block; }
  .intro-title {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }
  .intro-main {
    font-size: 1.7rem;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }
  .intro-desc {
    font-size: 1rem;
    color: var(--gray);
    margin-bottom: 2rem;
    line-height: 1.8;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.6s;
  }
  .lottery-btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), #ff6b81);
    color: #fff;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    border: none;
    border-radius: 60px;
    padding: 1rem 2.5rem;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.8s, pulse 2s ease-in-out infinite 1.4s;
    -webkit-tap-highlight-color: transparent;
  }
  .lottery-btn:active { transform: scale(0.95); }
  .lottery-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
    animation: shine 3s ease-in-out infinite;
  }
  .lottery-hint {
    font-size: 0.85rem;
    color: #666;
    margin-top: 1rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.0s;
  }
  .spin-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 50vh;
  }
  .spin-text {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gray);
    margin-bottom: 2rem;
    animation: blink 0.6s ease-in-out infinite;
  }
  .slot-display {
    font-size: 4rem;
    font-weight: 900;
    width: 120px;
    height: 80px;
    line-height: 80px;
    border: 3px solid var(--accent);
    border-radius: 16px;
    background: var(--box-bg);
    overflow: hidden;
    position: relative;
  }
  .slot-number {
    position: absolute;
    width: 100%;
    text-align: center;
    color: var(--white);
  }
  .win-title {
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: bounceIn 0.8s ease forwards 0.2s;
    text-shadow: 0 0 30px rgba(255,215,0,0.5);
  }
  .win-sub {
    font-size: 1.1rem;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.6s;
  }
  .win-prize {
    display: inline-block;
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    color: #1a1a2e;
    font-size: 1.2rem;
    font-weight: 900;
    border-radius: 14px;
    padding: 1rem 2rem;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.8s;
  }
  .win-action {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.8;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.0s;
  }
  .lose-title {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }
  .lose-sub {
    font-size: 1rem;
    color: var(--gray);
    margin-bottom: 2rem;
    line-height: 1.8;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }
  .highlight-box {
    display: inline-block;
    background: var(--box-bg);
    border: 2.5px solid var(--accent);
    border-radius: 14px;
    padding: 0.8rem 1.5rem;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.6s;
  }
  .highlight-box .text {
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(233,69,96,0.3);
  }
  .lose-action {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.8;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.8s;
  }
  .divider {
    position: relative;
    width: 180px;
    height: 2px;
    background: #3c3c66;
    margin: 0 auto 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.2s;
  }
  .divider::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  .company {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--gray);
    letter-spacing: 0.15em;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.4s;
  }
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 99;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    top: -20px;
    opacity: 0;
  }
  .confetti-piece.active {
    animation: confettiFall 3s ease-in forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(233,69,96,0.4); }
    50% { transform: scale(1.03); box-shadow: 0 0 20px 5px rgba(233,69,96,0.2); }
  }
  @keyframes shine {
    0%, 100% { transform: translateX(-100%) rotate(45deg); }
    50% { transform: translateX(100%) rotate(45deg); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes bounceIn {
    0% { opacity: 0; transform: scale(0.3); }
    50% { opacity: 1; transform: scale(1.1); }
    70% { transform: scale(0.95); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }
  @media (max-width: 400px) {
    .intro-main { font-size: 1.4rem; }
    .win-title { font-size: 2rem; }
    .lottery-btn { font-size: 1.1rem; padding: 0.9rem 2rem; }
  }
</style>
</head>
<body>
  <div class="side-line left"></div>
  <div class="side-line right"></div>
  <div class="diamond tl"></div>
  <div class="diamond tr"></div>
  <div class="diamond bl"></div>
  <div class="diamond br"></div>
  <div class="confetti-container" id="confetti"></div>
  <div class="card">
    <div class="screen active" id="screen-intro">
      <p class="intro-title">テストにご協力いただき</p>
      <p class="intro-main">ありがとうございます！</p>
      <p class="intro-desc">
        QRコードを読み取っていただいた<br>
        あなたに、特別なチャンスを<br>
        ご用意しました！
      </p>
      <button class="lottery-btn" id="lotteryBtn" onclick="startLottery()">
        🎰 抽選スタート！
      </button>
      <p class="lottery-hint">※ 当選確率 10%</p>
    </div>
    <div class="screen" id="screen-spin">
      <div class="spin-container">
        <p class="spin-text">抽選中…</p>
        <div class="slot-display">
          <div class="slot-number" id="slotNumber">?</div>
        </div>
      </div>
    </div>
    <div class="screen" id="screen-win">
      <p class="win-title">🎊 大当たり！🎊</p>
      <p class="win-sub">おめでとうございます！</p>
      <div class="win-prize">
        🎁 お好きな飲み物またはお菓子を<br>どちらか一つプレゼント！
      </div>
      <p class="win-action">
        この画面をアドトラック代表・宮本に<br>お見せください。
      </p>
      <div class="divider"></div>
      <p class="company">株式会社アドトラック</p>
    </div>
    <div class="screen" id="screen-lose">
      <p class="lose-title">残念…！ハズレ</p>
      <p class="lose-sub">
        でも、QRコードを読み取った<br>
        その勇気ある行動に敬意を表して…
      </p>
      <div class="highlight-box">
        <span class="text">「QRコード見ました！」</span>
      </div>
      <p class="lose-action">
        とアドトラック代表・宮本に<br>
        お声がけいただければ<br>
        良いことがあるかも…？
      </p>
      <div class="divider"></div>
      <p class="company">株式会社アドトラック</p>
    </div>
  </div>
<script>
function startLottery(){var b=document.getElementById('lotteryBtn');b.disabled=true;b.style.opacity='0.5';var w=Math.floor(Math.random()*10)===0;showScreen('screen-spin');var s=document.getElementById('slotNumber');var c=0;var t=setInterval(function(){s.textContent=Math.floor(Math.random()*10);c++;if(c>20){clearInterval(t);var sc=0;var st=setInterval(function(){s.textContent=Math.floor(Math.random()*10);sc++;if(sc>6){clearInterval(st);s.textContent=w?'\u2605':'\u00d7';s.style.color=w?'var(--gold)':'var(--accent)';setTimeout(function(){if(w){showScreen('screen-win');launchConfetti();}else{showScreen('screen-lose');}},800);}},200);}},80);}
function showScreen(id){var ss=document.querySelectorAll('.screen');for(var i=0;i<ss.length;i++){ss[i].classList.remove('active');}document.getElementById(id).classList.add('active');}
function launchConfetti(){var co=document.getElementById('confetti');var cl=['#e94560','#ffd700','#00e676','#4fc3f7','#ff6b81','#fff'];for(var i=0;i<80;i++){var p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.width=(Math.random()*8+6)+'px';p.style.height=(Math.random()*8+6)+'px';p.style.background=cl[Math.floor(Math.random()*cl.length)];p.style.borderRadius=Math.random()>0.5?'50%':'2px';p.style.animationDelay=(Math.random()*1.5)+'s';p.style.animationDuration=(Math.random()*2+2)+'s';co.appendChild(p);setTimeout((function(x){return function(){x.classList.add('active');};})(p),50);}}
</script>
</body>
</html>
